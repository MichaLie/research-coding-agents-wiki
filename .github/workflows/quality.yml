name: Catalogue quality gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  deterministic-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-maintenance.txt
      - run: python3 -m pip install -r requirements-maintenance.txt
      - name: Deterministic build, FAIR schema, and semantic gates
        run: python3 maintenance/run_maintenance.py --mode release --skip-links
      - name: Synthetic fault-injection suite
        run: python3 maintenance/simulate_maintenance.py
      - name: Upload transparent reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maintenance-reports
          path: .maintenance-output/

  live-links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-maintenance.txt
      - run: python3 -m pip install -r requirements-maintenance.txt
      - name: Audit every external catalogue URL
        run: python3 maintenance/run_maintenance.py --mode full
      - name: Upload link evidence and report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-link-audit
          path: .maintenance-output/
